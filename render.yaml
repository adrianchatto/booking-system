services:
  - type: web
    name: bookright-platform
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run db:seed && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookright-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://bookright-platform.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: bookright-db
    databaseName: bookright
    user: bookright
    plan: free
